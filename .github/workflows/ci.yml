name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock
      - run: pip install -r backend/requirements.lock
      - run: pip install pip-audit==2.10.1
      - run: pip-audit -r backend/requirements.lock --progress-spinner off
      - run: pytest -q
        working-directory: backend
      - run: python -m scripts.benchmark --iterations 5
        working-directory: backend

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm audit --audit-level=high
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  container:
    name: Container smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: docker build -t pr-review-intelligence:test .
      - run: docker run -d --name app -p 8000:8000 pr-review-intelligence:test
      - name: Wait for health endpoint
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/api/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs app
          exit 1
