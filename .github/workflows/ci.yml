name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock
      - run: pip install -r backend/requirements.lock
      - run: pip install pip-audit==2.10.1
      - run: pip-audit -r backend/requirements.lock --progress-spinner off
      - run: pytest -q
        working-directory: backend
      - run: python -m scripts.benchmark --iterations 5
        working-directory: backend

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm audit --audit-level=high
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  container:
    name: Container smoke test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: docker build -t pr-review-intelligence:test .
      - run: docker run -d --name app -p 8000:8000 pr-review-intelligence:test
      - name: Wait for health endpoint
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8000/api/health; then
              exit 0
            fi
            sleep 2
          done
          docker logs app
          exit 1
